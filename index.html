<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Tem Ngân Hàng Máu</title>
    <style>
        :root {
            /* Tone màu xanh y tế (Medical Teal/Blue) */
            --med-dark: #004d40;
            --med-primary: #00796b;
            --med-light: #4db6ac;
            --med-bg: #e0f2f1;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--med-bg), #b2dfdb, var(--med-light));
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Giao diện Glassmorphism */
        .app-container {
            background: rgba(255, 255, 255, 0.7);
            padding: 25px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 360px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 15px;
        }

        .header-logo svg {
            width: 45px;
            height: 45px;
            fill: var(--med-primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        h2 {
            text-align: center;
            color: var(--med-dark);
            margin: 0 0 20px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* Tự động in hoa khi nhập tên */
        #patientName {
            text-transform: uppercase;
        }

        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid rgba(0, 121, 107, 0.2);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--med-primary);
            box-shadow: 0 0 8px rgba(0, 121, 107, 0.3);
        }

        /* Nút chọn nhóm máu */
        .blood-group-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-group {
            display: flex;
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(0, 121, 107, 0.2);
        }

        .btn-sel {
            flex: 1;
            padding: 8px 0;
            border: none;
            background: transparent;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            border-right: 1px solid rgba(0, 121, 107, 0.1);
        }

        .btn-sel:last-child {
            border-right: none;
        }

        .btn-sel:hover {
            background: rgba(0, 121, 107, 0.1);
        }

        .btn-sel.active {
            background: var(--med-primary);
            color: white;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Nút In */
        .btn-print {
            width: 100%;
            margin-top: 15px;
            font-size: 15px;
            padding: 12px;
            background: linear-gradient(135deg, var(--med-primary), var(--med-dark));
            letter-spacing: 1px;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 77, 64, 0.4);
        }

        /* Chữ ký rồng */
        .signature-wrapper {
            position: fixed;
            bottom: 25px;
            right: 35px;
            display: flex;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .signature-text {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            color: transparent;
            margin-right: -25px;
            z-index: 2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        .dragon-svg {
            width: 90px;
            height: 90px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 6px rgba(253, 245, 169, 0.5));
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        /* ============================
           CẤU TRÚC IN TEM 1.58" x 0.79"
           ============================ */
        #label-preview {
            display: none;
            width: 1.58in;
            height: 0.79in;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            color: black;
            background: white;
            margin: 0;
            padding: 0.05in 0.08in; /* Padding tối ưu */
        }

        @media print {
            @page { size: 1.58in 0.79in; margin: 0; }
            body { background: none; margin: 0; padding: 0; }
            .app-container, .signature-wrapper { display: none; }
            
            #label-preview {
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                page-break-after: always;
                overflow: hidden;
            }

            /* Layout các thành phần bản in */
            .p-name {
                font-weight: 900;
                font-size: 9.5pt;
                text-transform: uppercase;
                margin: 0;
                line-height: 1.1;
                /* Chống tràn dòng */
                white-space: nowrap;
                overflow: hidden;
            }

            /* Class tự động chèn bằng JS nếu tên dài */
            .p-name.long-text {
                font-size: 7.5pt;
                white-space: normal; /* Cho phép xuống dòng nếu siêu dài */
                line-height: 1;
            }

            .p-details {
                font-size: 7.5pt;
                font-weight: bold;
                line-height: 1.2;
            }

            .p-bottom-row {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
            }

            .p-blood {
                font-size: 11pt;
                font-weight: 900;
                border: 1px solid black;
                padding: 1px 4px;
                border-radius: 3px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-logo">
            <svg viewBox="0 0 24 24"><path d="M19 3H5C3.89 3 3 3.9 3 5V19C3 20.1 3.89 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3M19 19H5V5H19V19M11 7H13V11H17V13H13V17H11V13H7V11H11V7Z"/></svg>
        </div>
        <h2>Medical Label</h2>
        
        <div class="form-group">
            <label>Tên Bệnh Nhân</label>
            <input type="text" id="patientName" placeholder="Nhập tên bệnh nhân...">
        </div>

        <div class="form-group">
            <label>Năm Sinh</label>
            <input type="date" id="birthYear">
        </div>

        <div class="form-group">
            <label>Khoa</label>
            <select id="department">
                <option value="" disabled selected>-- Chọn Khoa --</option>
                <option value="Cấp Cứu">Cấp Cứu</option>
                <option value="Hồi Sức Tích Cực - Chống Độc">Hồi Sức Tích Cực - Chống Độc</option>
                <option value="Dịch Vụ">Dịch Vụ</option>
                <option value="Nội Tiết">Nội Tiết</option>
                <option value="Tim Mạch">Tim Mạch</option>
                <option value="Tâm Thần">Tâm Thần</option>
                <option value="Thần Kinh">Thần Kinh</option>
                <option value="Nội Tiêu Hóa">Nội Tiêu Hóa</option>
                <option value="Huyết Học Lâm Sàng - Cơ Xương Khớp">Huyết Học Lâm Sàng - Cơ Xương Khớp</option>
                <option value="Lão Học">Lão Học</option>
                <option value="Truyền Nhiễm">Truyền Nhiễm</option>
                <option value="Hô Hấp - Lao">Hô Hấp - Lao</option>
                <option value="Lọc Máu">Lọc Máu</option>
                <option value="Mắt">Mắt</option>
                <option value="Tai - Mũi - Họng">Tai - Mũi - Họng</option>
                <option value="Răng Hàm Mặt">Răng Hàm Mặt</option>
                <option value="Da Liễu">Da Liễu</option>
                <option value="Phẫu Thuật Gây Mê Hồi Sức">Phẫu Thuật Gây Mê Hồi Sức</option>
                <option value="Ngoại Tổng Hợp">Ngoại Tổng Hợp</option>
                <option value="Ngoại Thần Kinh">Ngoại Thần Kinh</option>
                <option value="Ung Bướu">Ung Bướu</option>
                <option value="Chấn Thương Chỉnh Hình - Bỏng">Chấn Thương Chỉnh Hình - Bỏng</option>
            </select>
        </div>

        <div class="form-group">
            <label>Nhóm Máu</label>
            <div class="blood-group-container">
                <!-- Group ABO -->
                <div class="btn-group">
                    <button type="button" class="btn-sel btn-abo" data-val="A">A</button>
                    <button type="button" class="btn-sel btn-abo" data-val="B">B</button>
                    <button type="button" class="btn-sel btn-abo" data-val="AB">AB</button>
                    <button type="button" class="btn-sel btn-abo" data-val="O">O</button>
                </div>
                <!-- Group Rh -->
                <div class="btn-group" style="flex: 0.5;">
                    <button type="button" class="btn-sel btn-rh" data-val="Rh+">+</button>
                    <button type="button" class="btn-sel btn-rh" data-val="Rh-">-</button>
                </div>
            </div>
        </div>

        <button class="btn-print" onclick="preparePrint()">🖨 IN TEM</button>
    </div>

    <!-- Chữ ký rồng -->
    <div class="signature-wrapper">
        <div class="signature-text">A Product of Handsome Long</div>
        <svg class="dragon-svg" viewBox="0 0 100 100" fill="url(#gold-grad)">
            <defs>
                <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#bf953f" />
                    <stop offset="30%" style="stop-color:#fcf6ba" />
                    <stop offset="50%" style="stop-color:#b38728" />
                    <stop offset="70%" style="stop-color:#fbf5b7" />
                    <stop offset="100%" style="stop-color:#aa771c" />
                </linearGradient>
            </defs>
            <path d="M70,30 C90,20 95,45 80,60 C65,75 40,65 50,85 C60,105 90,95 85,110 C80,125 50,110 30,120 C10,130 5,100 20,90 C35,80 60,95 55,75 C50,55 25,65 20,45 C15,25 45,15 55,30 Z" stroke="url(#gold-grad)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, -15) scale(0.9)"/>
            <circle cx="72" cy="30" r="2" fill="#fff"/>
        </svg>
    </div>

    <!-- Vùng in ẩn -->
    <div id="label-preview">
        <div class="p-name" id="lbl-name"></div>
        <div class="p-bottom-row">
            <div class="p-details">
                <span id="lbl-dob"></span><br>
                <span id="lbl-dept"></span>
            </div>
            <div class="p-blood" id="lbl-blood"></div>
        </div>
    </div>

    <script>
        // Xử lý Logic Chọn Nhóm Máu
        let selectedAbo = "";
        let selectedRh = "";

        const aboBtns = document.querySelectorAll('.btn-abo');
        const rhBtns = document.querySelectorAll('.btn-rh');

        aboBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                aboBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedAbo = btn.getAttribute('data-val');
            });
        });

        rhBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                rhBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRh = btn.getAttribute('data-val');
            });
        });

        // Hàm chuẩn bị dữ liệu và In
        function preparePrint() {
            const nameInput = document.getElementById('patientName').value.trim();
            const dateInput = document.getElementById('birthYear').value;
            const deptInput = document.getElementById('department').value;

            // Validate cơ bản
            if (!nameInput) {
                alert("Vui lòng nhập Tên Bệnh Nhân!");
                return;
            }

            // Xử lý Ngày sinh từ YYYY-MM-DD sang DD/MM/YYYY
            let formattedDate = "";
            if (dateInput) {
                const [year, month, day] = dateInput.split('-');
                formattedDate = `${day}/${month}/${year}`;
            }

            // Xử lý chuỗi Nhóm máu (VD: A (Rh+))
            let finalBlood = "";
            if (selectedAbo && selectedRh) {
                finalBlood = `${selectedAbo} (${selectedRh})`;
            }

            // Xử lý độ dài tên (Nếu dài hơn 18 ký tự sẽ add class giảm font chữ)
            const lblName = document.getElementById('lbl-name');
            lblName.innerText = nameInput;
            if (nameInput.length > 18) {
                lblName.classList.add('long-text');
            } else {
                lblName.classList.remove('long-text');
            }

            // Đổ dữ liệu vào vùng in (Không còn nhãn tiền tố)
            document.getElementById('lbl-dob').innerText = formattedDate;
            document.getElementById('lbl-dept').innerText = deptInput;
            document.getElementById('lbl-blood').innerText = finalBlood;

            // Kích hoạt in
            window.print();
        }
    </script>
</body>
</html>
